<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kas Masjid</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; padding: 1.5rem 1rem; color: #1a1a1a; }
  .app { max-width: 600px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; }
  .icon { width: 40px; height: 40px; background: #e6f4ea; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
  .icon svg { width: 20px; height: 20px; stroke: #2d7d46; fill: none; stroke-width: 2; }

  .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.25rem; }
  .sum-card { background: #fff; border-radius: 10px; padding: 12px 14px; border: 1px solid #e8e8e8; }
  .sum-label { font-size: 11px; color: #999; margin-bottom: 4px; }
  .sum-val { font-size: 14px; font-weight: 600; }
  .sum-val.in { color: #2d7d46; }
  .sum-val.out { color: #c0392b; }
  .sum-val.saldo { color: #1a1a1a; }

  .card { background: #fff; border-radius: 12px; border: 1px solid #e8e8e8; padding: 1.25rem; margin-bottom: 1.25rem; }
  .card-title { font-size: 13px; font-weight: 600; color: #666; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.04em; }

  .setup-card { background: #eef4ff; border: 1px solid #c5d8f8; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.25rem; }
  .setup-card .card-title { color: #2558b8; }
  .setup-card p { font-size: 12px; color: #3a6abf; line-height: 1.6; margin-bottom: 10px; }
  .url-row { display: flex; gap: 8px; }
  .url-row input { flex: 1; padding: 8px 10px; border: 1px solid #b0c8f0; border-radius: 8px; font-size: 13px; background: #fff; color: #1a1a1a; }
  .btn-save { padding: 8px 14px; background: #2558b8; color: #fff; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; white-space: nowrap; font-family: inherit; }
  .btn-save:hover { background: #1e47a0; }
  .url-saved { font-size: 11px; color: #2d7d46; margin-top: 5px; display: none; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-group label { font-size: 12px; color: #666; font-weight: 500; }
  .form-group input { padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; color: #1a1a1a; font-family: inherit; background: #fff; }
  .form-group input:focus { outline: none; border-color: #2558b8; box-shadow: 0 0 0 3px rgba(37,88,184,0.1); }

  .status { font-size: 12px; text-align: center; padding: 8px; border-radius: 8px; margin-top: 10px; display: none; }
  .status.show { display: block; }
  .status.success { background: #e6f4ea; color: #2d7d46; }
  .status.error { background: #fdecea; color: #c0392b; }
  .status.loading { background: #f0f0f0; color: #666; }

  .btn-row { display: flex; gap: 8px; margin-top: 12px; }
  .btn-primary { flex: 1; padding: 10px; background: #2d7d46; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .btn-primary:hover { background: #256039; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-reset { padding: 10px 16px; background: #f0f0f0; color: #555; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-family: inherit; }
  .btn-reset:hover { background: #e5e5e5; }

  .history-card { background: #fff; border-radius: 12px; border: 1px solid #e8e8e8; overflow: hidden; }
  .history-head { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.25rem; border-bottom: 1px solid #f0f0f0; }
  .history-head h2 { font-size: 13px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.04em; }
  .badge { font-size: 12px; background: #f0f0f0; color: #888; padding: 3px 9px; border-radius: 20px; }
  .empty { padding: 2rem; text-align: center; color: #bbb; font-size: 13px; }
  .tx { display: grid; grid-template-columns: 10px 1fr auto; gap: 0 12px; padding: 12px 1.25rem; border-bottom: 1px solid #f5f5f5; align-items: center; }
  .tx:last-child { border-bottom: none; }
  .dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 3px; }
  .dot.in { background: #2d7d46; }
  .dot.out { background: #c0392b; }
  .tx-info .kode { font-size: 11px; color: #bbb; }
  .tx-info .ket { font-size: 13px; color: #1a1a1a; }
  .tx-info .tgl { font-size: 11px; color: #bbb; }
  .tx-right { text-align: right; }
  .tx-right .amount { font-size: 14px; font-weight: 600; }
  .tx-right .amount.in { color: #2d7d46; }
  .tx-right .amount.out { color: #c0392b; }
  .tx-right .type { font-size: 11px; color: #bbb; }
  .del-btn { background: none; border: none; cursor: pointer; color: #ccc; font-size: 13px; padding: 2px 5px; display: block; margin-top: 2px; margin-left: auto; }
  .del-btn:hover { color: #c0392b; }

  @media (max-width: 480px) {
    .summary-grid { grid-template-columns: 1fr 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    .form-group.full { grid-column: 1; }
    .sum-card:last-child { grid-column: 1 / -1; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="icon"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
    <div><h1>Kas Masjid</h1><p class="subtitle" style="margin:0">Pencatatan pemasukan &amp; pengeluaran</p></div>
  </div>

  <div class="summary-grid">
    <div class="sum-card"><div class="sum-label">Total Pemasukan</div><div class="sum-val in" id="total-in">Rp 0</div></div>
    <div class="sum-card"><div class="sum-label">Total Pengeluaran</div><div class="sum-val out" id="total-out">Rp 0</div></div>
    <div class="sum-card"><div class="sum-label">Saldo Kas</div><div class="sum-val saldo" id="saldo">Rp 0</div></div>
  </div>

  <div class="setup-card">
    <div class="card-title">Koneksi Google Sheets</div>
    <p>Tempel URL Apps Script kamu di sini. Hanya perlu diisi sekali, tersimpan otomatis.</p>
    <div class="url-row">
      <input type="text" id="sheet-url" placeholder="https://script.google.com/macros/s/..." />
      <button class="btn-save" onclick="saveUrl()">Simpan</button>
    </div>
    <div class="url-saved" id="url-saved">✓ URL tersimpan</div>
  </div>

  <div class="card">
    <div class="card-title">Input transaksi baru</div>
    <div class="form-grid">
      <div class="form-group"><label>Tanggal</label><input type="date" id="inp-tanggal" /></div>
      <div class="form-group"><label>Kode</label><input type="text" id="inp-kode" placeholder="mis. KAS-001" /></div>
      <div class="form-group full"><label>Keterangan</label><input type="text" id="inp-ket" placeholder="mis. Infaq Jumat" /></div>
      <div class="form-group"><label>Pemasukan (Rp)</label><input type="number" id="inp-masuk" placeholder="0" min="0" /></div>
      <div class="form-group"><label>Pengeluaran (Rp)</label><input type="number" id="inp-keluar" placeholder="0" min="0" /></div>
    </div>
    <div class="status" id="status"></div>
    <div class="btn-row">
      <button class="btn-reset" onclick="resetForm()">Reset</button>
      <button class="btn-primary" id="btn-submit" onclick="submitData()">Simpan Transaksi</button>
    </div>
  </div>

  <div class="history-card">
    <div class="history-head">
      <h2>Histori Transaksi</h2>
      <span class="badge" id="tx-count">0 data</span>
    </div>
    <div id="history-list"><div class="empty">Belum ada transaksi.</div></div>
  </div>
</div>

<script>
let transactions = JSON.parse(localStorage.getItem('kas_masjid') || '[]');
let scriptUrl = localStorage.getItem('kas_script_url') || '';

if (scriptUrl) {
  document.getElementById('sheet-url').value = scriptUrl;
  document.getElementById('url-saved').style.display = 'block';
}
document.getElementById('inp-tanggal').value = new Date().toISOString().split('T')[0];

function saveUrl() {
  const url = document.getElementById('sheet-url').value.trim();
  if (!url) return;
  localStorage.setItem('kas_script_url', url);
  scriptUrl = url;
  document.getElementById('url-saved').style.display = 'block';
}

function formatRp(n) {
  return 'Rp ' + Math.round(n).toLocaleString('id-ID');
}

function renderSummary() {
  const totalIn = transactions.reduce((s, t) => s + (t.masuk || 0), 0);
  const totalOut = transactions.reduce((s, t) => s + (t.keluar || 0), 0);
  document.getElementById('total-in').textContent = formatRp(totalIn);
  document.getElementById('total-out').textContent = formatRp(totalOut);
  const saldo = totalIn - totalOut;
  const el = document.getElementById('saldo');
  el.textContent = formatRp(Math.abs(saldo));
  el.className = 'sum-val ' + (saldo >= 0 ? 'in' : 'out');
  document.getElementById('tx-count').textContent = transactions.length + ' data';
}

function renderHistory() {
  const list = document.getElementById('history-list');
  if (!transactions.length) { list.innerHTML = '<div class="empty">Belum ada transaksi.</div>'; return; }
  list.innerHTML = [...transactions].reverse().map((t, ri) => {
    const i = transactions.length - 1 - ri;
    const isIn = t.masuk > 0;
    const val = isIn ? t.masuk : t.keluar;
    const d = new Date(t.tanggal + 'T00:00:00');
    const dateStr = d.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
    return `<div class="tx">
      <div class="dot ${isIn ? 'in' : 'out'}"></div>
      <div class="tx-info">
        <div class="kode">${t.kode || '-'}</div>
        <div class="ket">${t.keterangan}</div>
        <div class="tgl">${dateStr}</div>
      </div>
      <div class="tx-right">
        <div class="amount ${isIn ? 'in' : 'out'}">${isIn ? '+' : '-'}${formatRp(val)}</div>
        <div class="type">${isIn ? 'Pemasukan' : 'Pengeluaran'}</div>
        <button class="del-btn" onclick="deleteItem(${i})">✕ hapus</button>
      </div>
    </div>`;
  }).join('');
}

function deleteItem(idx) {
  if (!confirm('Hapus transaksi ini?')) return;
  transactions.splice(idx, 1);
  localStorage.setItem('kas_masjid', JSON.stringify(transactions));
  renderHistory(); renderSummary();
}

function showStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status show ' + type;
  if (type !== 'loading') setTimeout(() => el.className = 'status', 4000);
}

function resetForm() {
  ['inp-kode','inp-ket','inp-masuk','inp-keluar'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('inp-tanggal').value = new Date().toISOString().split('T')[0];
}

async function sendToSheet(data) {
  const base = scriptUrl.split('?')[0];
  const params = new URLSearchParams({
    tanggal: data.tanggal,
    kode: data.kode,
    keterangan: data.keterangan,
    masuk: String(data.masuk),
    keluar: String(data.keluar),
    timestamp: data.timestamp
  });
  const url = base + '?' + params.toString();
  try {
    const res = await fetch(url, { method: 'GET', mode: 'no-cors' });
    return true;
  } catch(e) {
    return false;
  }
}

async function submitData() {
  const tanggal = document.getElementById('inp-tanggal').value;
  const kode = document.getElementById('inp-kode').value.trim();
  const keterangan = document.getElementById('inp-ket').value.trim();
  const masuk = parseFloat(document.getElementById('inp-masuk').value) || 0;
  const keluar = parseFloat(document.getElementById('inp-keluar').value) || 0;

  if (!tanggal || !keterangan) { showStatus('Tanggal dan keterangan wajib diisi.', 'error'); return; }
  if (masuk === 0 && keluar === 0) { showStatus('Isi pemasukan atau pengeluaran.', 'error'); return; }
  if (masuk > 0 && keluar > 0) { showStatus('Isi salah satu: pemasukan atau pengeluaran.', 'error'); return; }

  const tx = { tanggal, kode, keterangan, masuk, keluar, timestamp: new Date().toISOString() };
  transactions.push(tx);
  localStorage.setItem('kas_masjid', JSON.stringify(transactions));
  renderHistory(); renderSummary();

  if (scriptUrl) {
    showStatus('Mengirim ke Google Sheets...', 'loading');
    document.getElementById('btn-submit').disabled = true;
    await sendToSheet(tx);
    document.getElementById('btn-submit').disabled = false;
    showStatus('Tersimpan! Cek Google Sheets kamu.', 'success');
  } else {
    showStatus('Tersimpan lokal!', 'success');
  }
  resetForm();
}

renderHistory(); renderSummary();
</script>
</body>
</html>
